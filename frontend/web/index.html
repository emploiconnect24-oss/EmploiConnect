<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="frontend">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>frontend</title>
  <link rel="manifest" href="manifest.json">

  <!-- GIS : requis par google_sign_in_web (popup). Ne pas dupliquer le client_id ici : -->
  <!-- il est chargé depuis GET /api/auth/google-config dans l’app Flutter (admin). -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.speakText = function (text, lang, genre) {
      try {
        if (!('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();
        var lg = lang || 'fr-FR';
        var isFemme = genre === 'femme';

        function pickFrVoice(voices) {
          var voixFr = voices.filter(function (v) {
            return (v.lang || '').toLowerCase().indexOf('fr') === 0;
          });
          if (voixFr.length === 0) return null;
          var n;
          if (isFemme) {
            n = voixFr.find(function (v) {
              var x = (v.name || '').toLowerCase();
              return x.indexOf('hortense') >= 0 || x.indexOf('julie') >= 0 || x.indexOf('denise') >= 0
                || x.indexOf('caroline') >= 0 || x.indexOf('female') >= 0 || x.indexOf('femme') >= 0;
            });
            return n || voixFr[0];
          }
          n = voixFr.find(function (v) {
            var x = (v.name || '').toLowerCase();
            return x.indexOf('henri') >= 0 || x.indexOf('paul') >= 0 || x.indexOf('thomas') >= 0
              || x.indexOf('male') >= 0 || x.indexOf('homme') >= 0;
          });
          return n || voixFr[voixFr.length - 1];
        }

        function run(voices) {
          var utterance = new SpeechSynthesisUtterance(text || '');
          utterance.lang = lg;
          utterance.rate = 0.88;
          utterance.pitch = isFemme ? 1.1 : 0.92;
          utterance.volume = 1.0;
          var v = pickFrVoice(voices || []);
          if (v) utterance.voice = v;
          window.speechSynthesis.speak(utterance);
        }

        var list = window.speechSynthesis.getVoices();
        if (list && list.length > 0) {
          run(list);
          return;
        }
        var done = false;
        function fire() {
          if (done) return;
          done = true;
          try { window.speechSynthesis.onvoiceschanged = null; } catch (e) {}
          run(window.speechSynthesis.getVoices());
        }
        window.speechSynthesis.onvoiceschanged = fire;
        setTimeout(fire, 400);
      } catch (e) {
        console.warn('speakText error:', e);
      }
    };

    var _recognition = null;

    window.startSpeechRecognition = function (callback) {
      try {
        var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) {
          console.warn('SpeechRecognition non supporte');
          return;
        }
        _recognition = new SR();
        _recognition.lang = 'fr-FR';
        _recognition.continuous = true;
        _recognition.interimResults = true;
        _recognition.onresult = function (event) {
          var transcript = '';
          for (var i = 0; i < event.results.length; i += 1) {
            transcript += event.results[i][0].transcript;
          }
          if (callback && typeof callback === 'function') {
            callback(transcript);
          }
        };
        _recognition.onerror = function (e) {
          console.warn('Speech error:', e.error);
        };
        _recognition.onend = function () {
          console.log('Speech recognition termine');
        };
        _recognition.start();
        console.log('Micro demarre');
      } catch (e) {
        console.warn('startSpeechRecognition error:', e);
      }
    };

    window.stopSpeechRecognition = function () {
      try {
        if (_recognition) {
          _recognition.stop();
          _recognition = null;
          console.log('Micro arrete');
        }
      } catch (e) {
        console.warn('stopSpeechRecognition error:', e);
      }
    };

    console.log('Speech API initialisee');
  </script>
</body>
</html>
